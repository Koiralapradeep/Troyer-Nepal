<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="login.js"></script>
    <style>
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --troyer-blue: #2f66ff;
    --troyer-blue-dark: #1e4ed8;
    --navy-900: #081426;
    --navy-800: #0d1b31;
    --navy-700: #13233d;
    --white: #ffffff;
    --text-main: #0f172a;
    --text-soft: #5f6f8f;
    --border-soft: rgba(255, 255, 255, 0.22);
    --input-border: rgba(47, 102, 255, 0.14);
    --input-focus: rgba(47, 102, 255, 0.45);
    --input-bg: rgba(255, 255, 255, 0.68);
    --card-bg: rgba(255, 255, 255, 0.16);
    --card-stroke: rgba(255, 255, 255, 0.24);
    --shadow-card:
      0 12px 32px rgba(2, 8, 23, 0.22),
      0 30px 80px rgba(2, 8, 23, 0.32);
    --shadow-btn:
      0 10px 24px rgba(47, 102, 255, 0.34);
    --error-bg: rgba(255, 244, 244, 0.95);
    --error-border: rgba(220, 38, 38, 0.18);
    --error-text: #b42318;
  }

  html,
  body {
    height: 100%;
    font-family: "Plus Jakarta Sans", sans-serif;
  }

  body.login-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    color: var(--white);
    background:
      linear-gradient(180deg, rgba(7, 18, 38, 0.54) 0%, rgba(7, 18, 38, 0.68) 100%),
      radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 34%),
      radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
      url("./HP.png") center center / cover no-repeat;
      padding-top:  5px;
  }

  body.login-page::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at center, transparent 42%, rgba(4, 10, 24, 0.28) 100%);
    pointer-events: none;
    z-index: 0;
  }

  body.login-page::after {
    content: "";
    position: fixed;
    inset: 0;
    backdrop-filter: blur(2.5px);
    -webkit-backdrop-filter: blur(2.5px);
    pointer-events: none;
    z-index: 0;
  }

  .bg-blob {
    position: fixed;
    border-radius: 999px;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }

  .blob-1 {
    width: 360px;
    height: 360px;
    top: -100px;
    left: -80px;
    background: rgba(47, 102, 255, 0.20);
    animation: drift 16s ease-in-out infinite alternate;
  }

  .blob-2 {
    width: 300px;
    height: 300px;
    right: -80px;
    bottom: -60px;
    background: rgba(59, 130, 246, 0.16);
    animation: drift 18s ease-in-out infinite alternate-reverse;
  }

  .blob-3,
  .bg-grid {
    display: none;
  }

  @keyframes drift {
    from {
      transform: translate3d(0, 0, 0) scale(1);
    }
    to {
      transform: translate3d(26px, 18px, 0) scale(1.06);
    }
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 430px;
    padding: 34px 34px 30px;
    border-radius: 28px;
    background: linear-gradient(
      180deg,
      rgba(252, 252, 253, 0.72) 0%,
      rgba(216, 209, 209, 0.58) 100%
    );
    border: 1px solid var(--card-stroke);
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    animation: card-rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    overflow: hidden;
  }

  .login-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.55) 0%,
        rgba(255, 255, 255, 0.10) 45%,
        transparent 70%
      );
    pointer-events: none;
  }

  .login-card::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: 27px;
    border: 1px solid rgba(255, 255, 255, 0.26);
    pointer-events: none;
  }

  @keyframes card-rise {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.985);
    }
    to {
      opacity: 1;
      transform: none;
    }
  }

  .login-logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }

  .login-logo-svg {
    width: 132px;
    height: auto;
    filter: drop-shadow(0 2px 10px rgba(47, 102, 255, 0.14));
  }

  .login-logo-svg path,
  .login-logo-svg polygon {
    fill: var(--troyer-blue-dark);
  }

  .login-heading {
    text-align: center;
    margin-bottom: 22px;
  }

  .login-title {
    font-size: 30px;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--troyer-blue-dark);
    margin-bottom: 8px;
  }

  .login-subtitle {
    font-size: 14px;
    font-weight: 500;
    color: var(--troyer-blue-dark);
    line-height: 1.5;
  }

  .login-divider {
    display: none;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    color:  var(--troyer-blue-dark);
  }

  .login-field label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--troyer-blue-dark);
  }

  .field-input-wrap {
    position: relative;
  }

  .field-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 17px;
    height: 17px;
    color: #5b77a8;
    pointer-events: none;
    transition: color 0.2s ease;
  }

  .field-input-wrap:focus-within .field-icon {
    color: var(--troyer-blue);
  }

  .login-field input {
    width: 100%;
    height: 54px;
    padding: 0 48px 0 46px;
    border-radius: 15px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--troyer-blue-dark);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease,
      background 0.2s ease,
      transform 0.15s ease;
  }

  .login-field input::placeholder {
    color: var(--troyer-blue-dark);
  }

  .login-field input:hover {
    background: rgba(255, 255, 255, 0.82);
    border-color: rgba(47, 102, 255, 0.24);
  }

  .login-field input:focus {
    background: rgba(255, 255, 255, 0.92);
    border-color: var(--troyer-blue-dark);
    box-shadow: 0 0 0 4px rgba(47, 102, 255, 0.12);
  }

  .eye-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--troyer-blue-dark);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .eye-toggle:hover {
    background: rgba(47, 102, 255, 0.08);
    color: var(--troyer-blue);
  }

  .eye-toggle svg {
    width: 17px;
    height: 17px;
  }

  .login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 4px 0 18px;
  }

  .remember-label {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    user-select: none;
    color:var(--troyer-blue-dark);
  }

  .remember-check {
    display: none;
  }

  .remember-box {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    border: 1.5px solid rgba(47, 102, 255, 0.22);
    background: rgba(255, 255, 255, 0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .remember-box::after {
    content: "";
    width: 5px;
    height: 9px;
    border: 2px solid transparent;
    border-top: 0;
    border-left: 0;
    transform: rotate(45deg) scale(0);
    margin-top: -2px;
    transition: transform 0.16s ease;
  }

  .remember-check:checked + .remember-box {
    background: linear-gradient(135deg, var(--troyer-blue), var(--troyer-blue-dark));
    border-color: transparent;
    box-shadow: 0 8px 20px rgba(47, 102, 255, 0.26);
  }

  .remember-check:checked + .remember-box::after {
    border-color: #fff;
    transform: rotate(45deg) scale(1);
  }

  .remember-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--troyer-blue-dark);
  }

  .forgot-link {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--troyer-blue-dark);
    text-decoration: none;
    transition: opacity 0.2s ease;
  }

  .forgot-link:hover {
    opacity: 0.72;
  }

  .login-error {
    margin-bottom: 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--error-text);
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 12px;
    padding: 12px 14px;
  }

  .login-btn {
    position: relative;
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(
      135deg,
      #2f66ff 0%,
      #1e4ed8 100%
    );
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    overflow: hidden;
    transition:
      transform 0.18s ease,
      box-shadow 0.18s ease,
      filter 0.18s ease;
  }

  .login-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.18),
      transparent 45%
    );
    pointer-events: none;
  }

  .login-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 48%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent,
      rgba(255, 255, 255, 0.24),
      transparent
    );
    transform: skewX(-20deg);
    transition: left 0.7s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 34px rgba(47, 102, 255, 0.38);
    filter: saturate(1.06);
  }

  .login-btn:hover::after {
    left: 130%;
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .btn-arrow {
    width: 16px;
    height: 16px;
    transition: transform 0.2s ease;
  }

  .login-btn:hover .btn-arrow {
    transform: translateX(3px);
  }

  @media (max-width: 480px) {
    .login-wrap {
      padding: 16px;
    }

    .login-card {
      padding: 28px 20px 22px;
      border-radius: 22px;
    }

    .login-title {
      font-size: 26px;
    }

    .login-options {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
  </head>
  <body class="login-page">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div class="bg-grid"></div>

    <main class="login-wrap">
      <form id="loginForm" class="login-card" autocomplete="on" novalidate>
        <div class="login-logo-wrap">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 283.46 64.46"
            class="login-logo-svg"
          >
            <path
              d="M116.71,16.8h-17.17l-8,41.47h10.15l2.96-15.6h6.38c4.06,0,5.68,1.97,5.68,5.51,0,2.32-.23,5.1-.23,7.19,0,1.22.12,2.38.52,2.9h10.03v-.52c-.52-.35-.81-1.33-.81-2.79,0-2.67.29-5.92.29-8,0-4.18-1.74-6.67-4.93-7.83v-.17c5.51-1.62,8.76-4.99,8.76-11.08,0-7.08-5.51-11.08-13.63-11.08ZM113.63,35.19h-7.48l1.97-10.32h7.02c3.36,0,5.05,1.68,5.05,4.58,0,4.06-3.02,5.74-6.55,5.74Z"
            />
            <path
              d="M155.05,15.99c-13.8,0-22.21,11.72-22.27,25.17-.06,11.72,7.95,18.1,18.68,18.1,13.8-.06,21.98-11.66,21.98-24.82,0-11.54-7.31-18.44-18.39-18.44ZM151.74,50.96c-6.26,0-8.7-4.47-8.7-9.92,0-7.54,3.31-16.76,11.54-16.82,6.15,0,8.58,4.52,8.58,10.32,0,7.42-3.19,16.41-11.43,16.41Z"
            />
            <path
              d="M201.68,16.8l-7.19,10.67c-1.91,2.9-3.94,6.32-3.94,6.32h-.12s-.64-3.6-1.45-6.44l-3.02-10.56h-10.61l8.41,25.98-2.96,15.49h10.15l2.9-15.14,18.79-26.33h-10.96Z"
            />
            <polygon
              points="244.26 25.15 245.88 16.8 215.78 16.8 207.77 58.27 238.51 58.27 240.2 49.63 219.55 49.63 221.29 40.64 238.51 40.64 240.02 32.75 222.85 32.75 224.3 25.15 244.26 25.15"
            />
            <path
              d="M283.46,27.88c0-7.08-5.51-11.08-13.63-11.08h-17.17l-8,41.47h10.15l2.96-15.6h6.38c4.06,0,5.68,1.97,5.68,5.51,0,2.32-.23,5.1-.23,7.19,0,1.22.12,2.38.52,2.9h10.03v-.52c-.52-.35-.81-1.33-.81-2.79,0-2.67.29-5.92.29-8,0-4.18-1.74-6.67-4.93-7.83v-.17c5.51-1.62,8.76-4.99,8.76-11.08ZM266.76,35.19h-7.48l1.97-10.32h7.02c3.36,0,5.05,1.68,5.05,4.58,0,4.06-3.02,5.74-6.55,5.74Z"
            />
            <path
              d="M47.41,3.05c-10.87-7.55-28.91-.6-40.31,15.53-3.12,4.38-5.52,9.24-7.11,14.42,1.18-2.63,2.6-5.13,4.26-7.48C13.95,11.82,29.3,5.91,38.53,12.33c9.23,6.42,8.87,22.74-.83,36.45-6.37,9.04-15.2,14.65-23.12,15.61,10.35.92,23.08-6.03,31.87-18.46,11.4-16.13,11.83-35.32.96-42.88Z"
            />
            <path
              d="M33.07,45.68s-13.03,15.09-21.36,6.7c-5.23-5.27-2.24-14.13,1.7-19.47,4.29-5.82,10.42-9.01,15.5-9.3,4.01-.23,7.74,2.82,8.64,6.68.57,2.43.21,4.34.21,4.34.73-2.15.63-4.49.41-6.12-.03-.27-.15-.92-.16-.98-.62-3.46-2.23-6.36-4.89-8.15-7.05-4.77-18.58-.14-25.77,10.36C.15,40.23.05,52.61,7.09,57.39c1.92,1.3,4.18,1.87,6.58,1.85.39.03,10.76.76,19.4-13.56Z"
            />
            <path
              d="M59.62,16.8c.3,2.75.25,5.64-.12,8.58h11.27l-6.38,32.89h10.09l6.38-32.89h11.77l1.62-8.58h-34.64Z"
            />
          </svg>
        </div>

        <!-- Heading -->
        <div class="login-heading">
          <h1 class="login-title">Welcome Back!</h1>
        </div>

        <!-- Email -->
        <div class="login-field">
          <label for="email">Email Address</label>
          <div class="field-input-wrap">
            <svg
              class="field-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input
              id="email"
              type="email"
              placeholder="sunil@gmail.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="login-field">
          <label for="password">Password</label>
          <div class="field-input-wrap">
            <svg
              class="field-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              class="eye-toggle"
              id="eyeToggle"
              aria-label="Toggle password visibility"
              tabindex="-1"
            >
              <!-- Eye open -->
              <svg
                id="iconEyeOpen"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <!-- Eye off -->
              <svg
                id="iconEyeOff"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Options row -->
        <div class="login-options">
          <label class="remember-label">
            <input type="checkbox" id="remember" class="remember-check" />
            <span class="remember-box"></span>
            <span class="remember-text">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Error -->
        <div id="loginError" class="login-error" style="display: none"></div>

        <!-- Submit -->
        <button type="submit" class="login-btn">
          <span class="btn-label">Sign In</span>
          <svg
            class="btn-arrow"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </form>
    </main>
    <script>
      const eyeToggle = document.getElementById("eyeToggle");
      const pwInput = document.getElementById("password");
      const iconEyeOpen = document.getElementById("iconEyeOpen");
      const iconEyeOff = document.getElementById("iconEyeOff");
      eyeToggle.addEventListener("click", () => {
        const visible = pwInput.type === "password";
        pwInput.type = visible ? "text" : "password";
        iconEyeOpen.style.display = visible ? "none" : "";
        iconEyeOff.style.display = visible ? "" : "none";
      });
    </script>
  </body>
</html>
